services:
  liverelay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - INSTANCE_ID=instance-1
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - METRICS_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - liverelay-network

  liverelay-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - INSTANCE_ID=instance-2
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - METRICS_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - liverelay-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - liverelay-network

  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
    depends_on:
      - liverelay
    networks:
      - liverelay-network

volumes:
  redis-data:

networks:
  liverelay-network:
    driver: bridge
